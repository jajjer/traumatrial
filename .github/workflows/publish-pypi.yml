name: publish to PyPI

# Tag a commit `engine-vX.Y.Z` to trigger a PyPI release.
# Requires:
#   - The PyPI project `traumatrial-match` to exist.
#   - A "Trusted Publisher" entry on PyPI pointing at this repo + this workflow.
#   - The GitHub environment `pypi` to exist (gates the upload).

on:
  push:
    tags:
      - "engine-v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: python -m pip install --upgrade build twine
      - name: Build wheel + sdist
        working-directory: engine
        run: python -m build
      - name: Validate metadata
        working-directory: engine
        run: python -m twine check dist/*
      - name: Run pytest
        working-directory: engine
        run: |
          python -m pip install -e ".[test]"
          python -m pytest -q
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: engine/dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/traumatrial-match
    permissions:
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (trusted publisher / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
